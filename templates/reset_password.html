{% extends "layout.html" %}
{% block content %}

<div class="w-full max-w-md mx-auto px-2 sm:px-0">
<div class="auth-card bg-white rounded-3xl shadow-xl border border-slate-100
            p-6 sm:p-10 transition-all">

    <!-- HEADER -->
    <div class="text-center mb-6 sm:mb-8">
        <div class="bg-emerald-50 w-14 h-14 sm:w-16 sm:h-16 rounded-2xl 
                    flex items-center justify-center mx-auto mb-4 
                    shadow-sm border border-emerald-100">
            <i class="fa-solid fa-lock text-emerald-500 text-2xl sm:text-3xl"></i>
        </div>

        <h2 class="text-xl sm:text-2xl font-extrabold text-slate-900 tracking-tight">
            Create New Password
        </h2>

        <p class="text-xs sm:text-sm text-slate-500 mt-1 font-medium">
            Enter a strong password to secure your account
        </p>
    </div>

    <!-- FORM -->
    <form method="POST" id="resetForm" class="space-y-5">

        <!-- NEW PASSWORD -->
        <div>
            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">
                New Password
            </label>

            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>

                <input id="password"
                    type="password"
                    name="password"
                    required minlength="6"
                    placeholder="••••••••"
                    class="w-full pl-12 pr-12 py-3 sm:py-4 rounded-2xl border border-slate-200
                           text-sm sm:text-base text-slate-800 font-medium
                           focus:ring-4 focus:ring-emerald-500/10 
                           focus:border-emerald-500 focus:outline-none transition-all">

                <button type="button"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition"
                    onclick="togglePassword('password', this.querySelector('i'))">
                    <i class="fa-solid fa-eye text-sm"></i>
                </button>
            </div>

            <p id="passwordError"
               class="text-[11px] font-semibold text-red-500 hidden mt-1">
                Password must contain 1 uppercase, 1 number & 1 special character.
            </p>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div>
            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">
                Confirm Password
            </label>

            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>

                <input id="confirm_password"
                    type="password"
                    name="confirm_password"
                    required minlength="6"
                    placeholder="••••••••"
                    class="w-full pl-12 pr-12 py-3 sm:py-4 rounded-2xl border border-slate-200
                           text-sm sm:text-base text-slate-800 font-medium
                           focus:ring-4 focus:ring-emerald-500/10 
                           focus:border-emerald-500 focus:outline-none transition-all">

                <button type="button"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition"
                    onclick="togglePassword('confirm_password', this.querySelector('i'))">
                    <i class="fa-solid fa-eye text-sm"></i>
                </button>
            </div>

            <p id="confirmPasswordError"
               class="text-[11px] font-semibold text-red-500 hidden mt-1">
                Passwords do not match.
            </p>
        </div>

        <!-- SUBMIT -->
        <button type="submit"
            class="w-full bg-gradient-to-r from-slate-900 to-slate-700 
                   text-white py-3.5 rounded-2xl 
                   text-sm font-semibold
                   flex items-center justify-center gap-2
                   shadow-lg hover:shadow-xl
                   hover:from-emerald-600 hover:to-emerald-500
                   transition-all duration-300 active:scale-95">

            <i class="fa-solid fa-check"></i>
            <span id="btnText">Reset Password</span>
        </button>

    </form>

</div>
</div>

<!-- SCRIPT -->
<script>
function togglePassword(fieldId, icon) {
    const input = document.getElementById(fieldId);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

document.getElementById("resetForm").addEventListener("submit", function(e) {
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirm_password');
    const passError = document.getElementById('passwordError');
    const matchError = document.getElementById('confirmPasswordError');
    const btnText = document.getElementById("btnText");

    const regex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{6,}$/;
    let valid = true;

    if (!regex.test(password.value)) {
        passError.classList.remove("hidden");
        valid = false;
    } else {
        passError.classList.add("hidden");
    }

    if (password.value !== confirm.value) {
        matchError.classList.remove("hidden");
        valid = false;
    } else {
        matchError.classList.add("hidden");
    }

    if (!valid) {
        e.preventDefault();
    } else {
        btnText.innerText = "Processing...";
    }
});
</script>

{% endblock %}
