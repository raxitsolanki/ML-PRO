{% extends "layout.html" %}

{% block content %}

<div class="w-full max-w-md mx-auto px-2 sm:px-4">

<div class="auth-card w-full max-w-sm sm:max-w-md 
px-5 sm:px-8 py-6 sm:py-8 
bg-white rounded-3xl shadow-xl border border-slate-100">

    <!-- HEADER -->
    <div class="text-center mb-6 sm:mb-8">
        <div class="bg-emerald-50 w-14 h-14 sm:w-16 sm:h-16 
        rounded-2xl flex items-center justify-center 
        mx-auto mb-4 shadow-sm border border-emerald-100">
            <i class="fa-solid fa-user-plus text-emerald-500 text-2xl sm:text-3xl"></i>
        </div>

        <h2 class="text-xl sm:text-3xl font-extrabold text-slate-900 tracking-tight">
            Create Account
        </h2>

        <p class="text-xs sm:text-base text-slate-500 mt-1 font-medium">
            Join DPS and manage your health journey
        </p>
    </div>

    <!-- FORM -->
    <form action="{{ url_for('register') }}" method="POST" onsubmit="return validateForm()" class="space-y-4">

        <!-- USERNAME -->
        <div>
            <label class="block text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">
                Username
            </label>
            <div class="relative">
                <i class="fa-solid fa-at absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" name="username" required minlength="3"
                    placeholder="Enter user name"
                    class="w-full pl-12 pr-4 py-3 sm:py-4 rounded-2xl border border-slate-200
                    text-slate-800 font-medium focus:ring-4 focus:ring-emerald-500/10 
                    focus:border-emerald-500 focus:outline-none transition-all text-sm">
            </div>
        </div>

        <!-- EMAIL -->
        <div>
            <label class="block text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">
                Email Address
            </label>
            <div class="relative">
                <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="email" name="email" required
                    placeholder="Enter Email Address"
                    class="w-full pl-12 pr-4 py-3 sm:py-4 rounded-2xl border border-slate-200
                    text-slate-800 font-medium focus:ring-4 focus:ring-emerald-500/10 
                    focus:border-emerald-500 focus:outline-none transition-all text-sm">
            </div>
        </div>

        <!-- PASSWORD -->
        <div>
            <label for="password" class="block text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">
                Password
            </label>

            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>

                <input
                    id="password"
                    type="password"
                    name="password"
                    required
                    minlength="6"
                    placeholder="••••••••"
                    onkeyup="validateForm()"
                    class="w-full pl-12 pr-12 py-3 sm:py-4 rounded-2xl border border-slate-200
                           text-slate-800 font-medium focus:ring-4 focus:ring-emerald-500/10 
                           focus:border-emerald-500 focus:outline-none transition-all text-sm"
                />

                <button
                    type="button"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition text-sm"
                    onclick="togglePassword('password', this.querySelector('i'))"
                >
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>

            <p id="passwordError" class="text-[10px] font-bold text-red-500 hidden flex items-center gap-1 mt-1">
                <i class="fa-solid fa-circle-exclamation"></i>
                Password must contain 1 uppercase, 1 number & 1 special character.
            </p>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div>
            <label for="confirm_password" class="block text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">
                Confirm Password
            </label>

            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>

                <input
                    id="confirm_password"
                    type="password"
                    name="confirm_password"
                    required
                    minlength="6"
                    placeholder="••••••••"
                    onkeyup="validateForm()"
                    class="w-full pl-12 pr-12 py-3 sm:py-4 rounded-2xl border border-slate-200
                           text-slate-800 font-medium focus:ring-4 focus:ring-emerald-500/10 
                           focus:border-emerald-500 focus:outline-none transition-all text-sm"
                />

                <button
                    type="button"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition text-sm"
                    onclick="togglePassword('confirm_password', this.querySelector('i'))"
                >
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>

            <p id="confirmPasswordError" class="text-[10px] font-bold text-red-500 hidden flex items-center gap-1 mt-1">
                <i class="fa-solid fa-circle-xmark"></i>
                Passwords do not match.
            </p>
        </div>

        <!-- SUBMIT -->
        <button type="submit"  
        class="w-full bg-gradient-to-r from-slate-900 to-slate-700 
        text-white py-3 sm:py-4 rounded-2xl 
        text-sm font-semibold
        flex items-center justify-center gap-2
        shadow-lg hover:shadow-xl
        hover:from-emerald-600 hover:to-emerald-500
        transition-all duration-300 active:scale-95">
            <i class="fa-solid fa-user-plus"></i>
            Register Account
        </button>

    </form>

    <!-- SIGN IN -->
    <p class="text-center text-xs sm:text-base text-slate-500 mt-6 sm:mt-8 font-medium">
        Already have an account?
        <a href="{{ url_for('login') }}" 
        class="text-slate-900 font-bold hover:text-emerald-600 transition underline-offset-4 hover:underline">
            Sign In
        </a>
    </p>

</div>
</div>

<!-- JAVASCRIPT -->
<script>
function togglePassword(fieldId, icon) {
    const input = document.getElementById(fieldId);

    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

function validateForm() {
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirm_password');
    const passError = document.getElementById('passwordError');
    const matchError = document.getElementById('confirmPasswordError');

    const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{6,}$/;

    let isValid = true;

    // Password strength check
    if (password.value.length > 0 && !regex.test(password.value)) {
        passError.classList.remove('hidden');
        passError.classList.add('flex');
        password.classList.add('border-red-400');
        isValid = false;
    } else {
        passError.classList.add('hidden');
        passError.classList.remove('flex');
        password.classList.remove('border-red-400');
    }

    // Password match check
    if (confirm.value.length > 0 && password.value !== confirm.value) {
        matchError.classList.remove('hidden');
        matchError.classList.add('flex');
        confirm.classList.add('border-red-400');
        isValid = false;
    } else {
        matchError.classList.add('hidden');
        matchError.classList.remove('flex');
        confirm.classList.remove('border-red-400');
    }

    return isValid;
}
</script>

{% endblock %}
