{% extends "layout.html" %}
{% block content %}

<div class="w-full max-w-md mx-auto px-3 sm:px-0">
<div class="auth-card bg-white rounded-3xl shadow-xl border border-slate-100
            p-6 sm:p-10 transition-all duration-300">

    <!-- HEADER -->
    <div class="text-center mb-7 sm:mb-8">
        <div class="bg-emerald-50 w-14 h-14 sm:w-16 sm:h-16 rounded-2xl 
                    flex items-center justify-center mx-auto mb-4 
                    shadow-sm border border-emerald-100">
            <i class="fa-solid fa-key text-emerald-500 text-2xl sm:text-3xl"></i>
        </div>

        <h2 class="text-xl sm:text-2xl font-extrabold text-slate-900 tracking-tight">
            Reset Your Password
        </h2>

        <p class="text-xs sm:text-sm text-slate-500 mt-2 font-medium leading-relaxed">
            Enter your registered email address to continue
        </p>
    </div>

    <!-- FORM -->
    <form method="POST" class="space-y-5">

        <!-- EMAIL -->
        <div>
            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">
                Email Address
            </label>

            <div class="relative">
                <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>

                <input type="email" 
                       name="email" 
                       required
                       placeholder="name@email.com"
                       autocomplete="email"
                       class="w-full pl-12 sm:pl-14 pr-4 py-3.5 sm:py-4 rounded-2xl border border-slate-200
                              text-sm sm:text-base text-slate-800 font-medium
                              focus:ring-4 focus:ring-emerald-500/10 
                              focus:border-emerald-500 focus:outline-none
                              transition-all duration-200">
            </div>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit"
            class="w-full bg-gradient-to-r from-slate-900 to-slate-700 
                   text-white py-3.5 sm:py-4 rounded-2xl 
                   text-sm font-semibold
                   flex items-center justify-center gap-2
                   shadow-lg hover:shadow-xl
                   hover:from-emerald-600 hover:to-emerald-500
                   transition-all duration-300 active:scale-95">

            <i class="fa-solid fa-paper-plane text-sm"></i>
            <span>Submit</span>
        </button>

    </form>

    <!-- BACK TO LOGIN -->
    <p class="text-center text-xs sm:text-sm text-slate-500 mt-7 sm:mt-8 font-medium">
        Remember your password?
        <a href="{{ url_for('login') }}"
           class="text-slate-900 font-bold hover:text-emerald-600 transition underline-offset-4 hover:underline">
            Sign In
        </a>
    </p>

</div>
</div>

{% endblock %}
