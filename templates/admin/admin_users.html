{% extends "admin/admin_layout.html" %}

{% block content %}
<h1 class="text-3xl font-bold mb-6">Users Control Panel</h1>

<div class="bg-white/80 backdrop-blur-md border border-gray-200 p-6 rounded-2xl shadow-lg mb-6">
  <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
    <div>
      <h2 class="text-lg font-semibold text-gray-800">Filter</h2>
      <p class="text-sm text-gray-500">
        Total Users: <span class="font-semibold text-blue-600">{{ users|length if users else 0 }}</span>
      </p>
    </div>

    <form method="GET" action="{{ url_for('admin_users') }}" class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto">
      <div class="relative w-full sm:w-72">
        <input type="text" name="search" value="{{ search or '' }}" placeholder="Search username or email..."
               class="w-full pl-4 pr-4 py-2 rounded-xl border border-gray-300 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <select name="sort" class="w-full sm:w-48 px-4 py-2 rounded-xl border border-gray-300 text-sm focus:ring-2 focus:ring-blue-500">
        <option value="latest" {{ 'selected' if sort=='latest' }}>Latest</option>
        <option value="az" {{ 'selected' if sort=='az' }}>A - Z</option>
        <option value="za" {{ 'selected' if sort=='za' }}>Z - A</option>
      </select>

      <button type="submit" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-medium hover:bg-blue-700 transition">Apply</button>
      <a href="{{ url_for('admin_users') }}" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-xl text-sm hover:bg-gray-300 transition">Reset</a>
    </form>
  </div>
</div>

<div class="overflow-x-auto rounded-lg shadow-md bg-white">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-100">
      <tr class="text-left text-xs uppercase tracking-wider text-gray-600">
        <th class="px-4 py-3">ID</th>
        <th class="px-4 py-3">Username</th>
        <th class="px-4 py-3">Email</th>
        <th class="px-4 py-3 text-center">Action</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-200">
      {% for u in users %}
      <tr class="hover:bg-gray-50 text-sm">
        <td class="px-4 py-3">{{ u['id'] }}</td>
        <td class="px-4 py-3 font-medium">{{ u['username'] }}</td>
        <td class="px-4 py-3">{{ u['email'] }}</td>
        <td class="px-4 py-3 text-center">
          <form action="{{ url_for('delete_user', user_id=u['id']) }}" method="POST" onsubmit="return confirm('Are you sure?');">
            <button type="submit" class="bg-red-500 text-white px-3 py-1.5 rounded-lg hover:bg-red-600 text-xs">
              Delete
            </button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr>
        <td colspan="4" class="text-center py-10 text-gray-500">No users found.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
