{% extends "admin/admin_layout.html" %}

{% block content %}

<h1 class="text-2xl md:text-3xl font-bold mb-6 text-center md:text-left">
  Admin Dashboard
</h1>

<!-- STATS CARDS -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">

  <div class="bg-white shadow rounded-2xl p-5 hover:shadow-lg transition">
      <h2 class="text-gray-500 text-sm">Total Users</h2>
      <p class="text-3xl md:text-4xl font-bold text-violet-700 mt-2">
          {{ total_users }}
      </p>
  </div>

  <div class="bg-white shadow rounded-2xl p-5 hover:shadow-lg transition">
      <h2 class="text-gray-500 text-sm">Total Messages</h2>
      <p class="text-3xl md:text-4xl font-bold text-green-600 mt-2">
          {{ total_messages }}
      </p>
  </div>

  <div class="bg-white shadow rounded-2xl p-5 hover:shadow-lg transition">
      <h2 class="text-gray-500 text-sm">Total Predictions</h2>
      <p class="text-3xl md:text-4xl font-bold text-pink-600 mt-2">
          {{ total_prediction }}
      </p>
  </div>

</div>


<!-- OVERVIEW CHART SECTION -->
<div class="bg-white shadow rounded-2xl p-5 mt-8">

    <!-- Title clearly visible -->
    <h2 class="text-gray-700 font-semibold text-base md:text-lg mb-4">
        Dashboard Overview
    </h2>

    <!-- Responsive Chart Wrapper -->
    <div class="relative w-full h-64 sm:h-72 md:h-80 lg:h-96">
        <canvas id="overviewChart"></canvas>
    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById('overviewChart');

if (ctx) {

    const gradientCtx = ctx.getContext('2d');

    const userGradient = gradientCtx.createLinearGradient(0, 0, 0, 400);
    userGradient.addColorStop(0, '#8b5cf6');
    userGradient.addColorStop(1, '#5b21b6');

    const messageGradient = gradientCtx.createLinearGradient(0, 0, 0, 400);
    messageGradient.addColorStop(0, '#34d399');
    messageGradient.addColorStop(1, '#059669');

    const predictionGradient = gradientCtx.createLinearGradient(0, 0, 0, 400);
    predictionGradient.addColorStop(0, '#f472b6');
    predictionGradient.addColorStop(1, '#db2777');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Users', 'Messages', 'Predictions'],
            datasets: [{
                data: [
                    {{ total_users }},
                    {{ total_messages }},
                    {{ total_prediction }}
                ],
                backgroundColor: [
                    userGradient,
                    messageGradient,
                    predictionGradient
                ],
                borderRadius: 12,
                barThickness: 'flex'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        font: { size: 12 }
                    }
                },
                x: {
                    ticks: {
                        font: { size: 12 }
                    }
                }
            }
        }
    });
}
</script>

{% endblock %}
