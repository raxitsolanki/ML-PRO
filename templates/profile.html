{% extends "layout_app.html" %}
{% block title %}Profile - DSP Health{% endblock %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #1e293b;
  --emerald: #10b981;
  --slate-bg: #f8fafc;
}

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--slate-bg);
}

.profile-card {
  background: #ffffff;
  border-radius: 2rem;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04),
              0 10px 10px -5px rgba(0, 0, 0, 0.02);
  overflow: hidden;
}

.profile-header {
  background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
  padding: 40px 20px;
  text-align: center;
}

.profile-avatar {
  width: 90px;
  height: 90px;
  background: rgba(255,255,255,0.1);
  border-radius: 25px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px auto;
  border: 1px solid rgba(255,255,255,0.2);
}

.profile-info-box {
  background: white;
  padding: 20px;
  border-radius: 1rem;
  transition: 0.3s;
}

.profile-info-box:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 15px rgba(0,0,0,0.05);
}
</style>

<div class="min-h-screen py-10 px-4">
  <div class="max-w-3xl mx-auto">

    <div class="profile-card">

      <!-- Header -->
      <div class="profile-header text-white">
        <div class="profile-avatar">
          <span class="text-3xl font-bold uppercase">
            {{ user.username[0] }}
          </span>
        </div>

        <h2 class="text-2xl font-bold">
          {{ user.username }}
        </h2>

        <p class="text-emerald-400 mt-2 text-sm">
          Verified Account
        </p>
      </div>

      <!-- Body -->
      <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50">

        <!-- Username -->
        <div class="profile-info-box">
          <label class="text-xs text-gray-400 uppercase">Username</label>
          <p class="text-lg font-bold text-[--navy]">
            {{ user.username }}
          </p>
        </div>

        <!-- Email -->
        <div class="profile-info-box">
          <label class="text-xs text-gray-400 uppercase">Email</label>
          <p class="text-lg font-bold text-[--navy] break-words">
            {{ user.email }}
          </p>
        </div>

        <!-- Member Since -->
        <div class="profile-info-box">
          <label class="text-xs text-gray-400 uppercase">Member Since</label>
          <p class="text-lg font-bold text-[--navy]">
            {{ user.created_at.strftime('%B %d, %Y') }}
          </p>
        </div>

        <!-- Live Time -->
        <div class="profile-info-box">
          <label class="text-xs text-gray-400 uppercase">Local Time</label>
          <p id="live-datetime" class="text-lg font-bold text-[--navy]"></p>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
function updateDateTime() {
  const now = new Date();
  document.getElementById('live-datetime').textContent =
    now.toLocaleTimeString('en-IN', {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    });
}

setInterval(updateDateTime, 1000);
updateDateTime();
</script>

{% endblock %}
