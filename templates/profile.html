{% extends "layout_app.html" %}
{% block title %}Profile - DSP Health{% endblock %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #1e293b;
  --emerald: #10b981;
  --slate-bg: #f8fafc;
}

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--slate-bg);
}

.profile-card {
  background: #ffffff;
  border-radius: 2rem;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04),
              0 10px 10px -5px rgba(0, 0, 0, 0.02);
  overflow: hidden;
}

.profile-header {
  background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
  padding: 40px 20px;
  text-align: center;
}

.profile-avatar {
  width: 90px;
  height: 90px;
  background: rgba(255,255,255,0.1);
  border-radius: 25px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px auto;
  border: 1px solid rgba(255,255,255,0.2);
}

.profile-info-box {
  background: white;
  padding: 20px;
  border-radius: 1rem;
  transition: 0.3s;
}

.profile-info-box:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 15px rgba(0,0,0,0.05);
}
</style>

<div class="min-h-screen py-10 px-4 sm:px-6 lg:px-8">
  <div class="max-w-4xl mx-auto">

    <!-- Page Header -->
    <div class="mb-10 text-center">
      <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-[--navy] tracking-tight">
        Account <span class="text-[var(--emerald)]">Settings</span>
      </h1>
      <p class="text-gray-500 text-base sm:text-lg md:text-xl max-w-2xl font-medium mx-auto mt-4">
        Manage your personal information and security preferences.
      </p>
    </div>

    <!-- Profile Card -->
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">

      <!-- Header -->
      <div class="bg-gradient-to-r from-emerald-500 to-emerald-600 text-white py-10 px-6 text-center">
        
        <!-- Avatar -->
        <div class="w-20 h-20 mx-auto rounded-2xl bg-white/20 backdrop-blur-md 
                    flex items-center justify-center text-3xl font-bold uppercase shadow-md">
          {{ user.username[0] }}
        </div>

        <h2 class="text-xl sm:text-2xl font-bold mt-4 break-words">
          {{ user.username }}
        </h2>

        <p class="text-emerald-100 mt-2 text-sm">
          Verified Account
        </p>
      </div>

      <!-- Body -->
      <div class="p-6 sm:p-8 grid grid-cols-1 sm:grid-cols-2 gap-5 bg-slate-50">

        <!-- Username -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
          <label class="text-xs text-gray-400 uppercase tracking-wide">Username</label>
          <p class="text-base sm:text-lg font-bold text-[--navy] break-words">
            {{ user.username }}
          </p>
        </div>

        <!-- Email -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
          <label class="text-xs text-gray-400 uppercase tracking-wide">Email</label>
          <p class="text-base sm:text-lg font-bold text-[--navy] break-words">
            {{ user.email }}
          </p>
        </div>

      

        <!-- Live Time -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
          <label class="text-xs text-gray-400 uppercase tracking-wide">Local Time</label>
          <p id="live-datetime" class="text-base sm:text-lg font-bold text-[--navy]"></p>
        </div>

      </div>

    </div>

  </div>
</div>

<!-- Live Date Time Script -->
<script>
  function updateDateTime() {
    const now = new Date();
    document.getElementById("live-datetime").textContent =
      now.toLocaleString();
  }
  updateDateTime();
  setInterval(updateDateTime, 1000);
</script>
<script>
function updateDateTime() {
  const now = new Date();
  document.getElementById('live-datetime').textContent =
    now.toLocaleTimeString('en-IN', {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    });
}

setInterval(updateDateTime, 1000);
updateDateTime();
</script>

{% endblock %}
